<!-- <!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyalty Program</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface-elevated: #ffffff;
    --border: #e9ecef;
    --text: #121212;
    --text-muted: #64748b;
    --brand: #6366f1;
    --brand-soft: #eef2ff;
    --accent: #10b981;
    --accent-soft: #ecfdf5;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.05);
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-elevated: #334155;
    --border: #334155;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --brand: #818cf8;
    --brand-soft: rgba(99, 102, 241, 0.15);
    --accent: #34d399;
    --accent-soft: rgba(16, 185, 129, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh; 
    font-size: 15px; 
    line-height: 1.6;
    transition: background 0.3s ease;
  }

  /* Header & Navigation */
  .topbar { 
    position: sticky; top: 0; z-index: 100; 
    background: rgba(var(--surface), 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); 
    padding: 0 2rem; 
    height: 64px; 
    display: flex; align-items: center; justify-content: space-between; 
  }
  .brand { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .brand span { color: var(--brand); }

  .theme-toggle { 
    background: var(--surface-elevated);
    padding: 6px 12px;
    border-radius: 100px;
    display: flex; align-items: center; gap: 10px; 
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border);
  }
  .toggle-pill { width: 32px; height: 18px; background: #cbd5e1; border-radius: 10px; position: relative; transition: 0.3s; }
  .toggle-pill.on { background: var(--brand); }
  .toggle-pill::after { content: ''; position: absolute; width: 12px; height: 12px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.2s; }
  .toggle-pill.on::after { transform: translateX(14px); }

  /* Main Container */
  .page { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; animation: fadeInUp 0.5s ease; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Cards */
  .card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: var(--radius); 
    padding: 1.5rem; 
    margin-bottom: 1.5rem; 
    box-shadow: var(--shadow-md);
  }
  .card-label { 
    font-size: 11px; font-weight: 700; text-transform: uppercase; 
    letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1.25rem; 
  }

  /* Login / Register Styling */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .login-card { width: 100%; max-width: 420px; text-align: center; }
  .login-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 0.5rem; }
  .auth-tabs { background: var(--bg); padding: 4px; display: flex; gap: 4px; border-radius: var(--radius-sm); margin-bottom: 1.5rem; border: 1px solid var(--border); }
  .auth-tab { flex: 1; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
  .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

  /* Form Elements */
  .field { text-align: left; margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .field input { 
    width: 100%; padding: 12px 16px; font-family: inherit; font-size: 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); transition: all 0.2s;
  }
  .field input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-soft); }

  .btn { 
    width: 100%; padding: 14px; font-size: 14px; font-weight: 700; border: none; 
    border-radius: var(--radius-sm); background: var(--brand); color: white; 
    cursor: pointer; transition: transform 0.1s, opacity 0.2s; 
  }
  .btn:active { transform: scale(0.98); }

  /* User Profile & Dashboard Items */
  .user-card { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .user-left { display: flex; align-items: center; gap: 1rem; }
  .avatar { 
    width: 52px; height: 52px; border-radius: 16px; 
    background: linear-gradient(135deg, var(--brand), #4f46e5); 
    color: white; font-weight: 700; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .uname { font-size: 18px; font-weight: 700; }
  .uemail { font-size: 13px; color: var(--text-muted); }
  
  .pts-badge { 
    font-family: 'JetBrains Mono', monospace; background: var(--brand-soft); 
    color: var(--brand); padding: 8px 16px; border-radius: 100px; font-weight: 600; 
  }

  /* Progress Bar */
  .progress-container { background: var(--bg); padding: 20px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .progress-track { height: 10px; background: var(--border); border-radius: 10px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--brand), var(--accent)); transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Achievement Grid */
  .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ach-chip { 
    padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); 
    background: var(--bg); transition: 0.2s; position: relative; overflow: hidden;
  }
  .ach-chip.unlocked { border-color: var(--accent); background: var(--accent-soft); }
  .ach-chip-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .ach-chip-meta { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

  /* Misc */
  .purchase-row { display: flex; gap: 10px; }
  .purchase-row input { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'JetBrains Mono'; }
  .tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .tab { padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  
  @media (max-width: 480px) {
    .ach-grid { grid-template-columns: 1fr; }
    .user-card { flex-direction: column; align-items: flex-start; }
    .right-group { width: 100%; justify-content: space-between; margin-top: 10px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">loyalty<span>.</span></div>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span id="theme-label">Light</span>
    <div class="toggle-pill" id="toggle-pill"></div>
  </div>
</div>

<div class="page" id="root"></div>

<script>
/* LOGIC REMAINS UNTOUCHED FOR COMPATIBILITY */
const API = 'http://loyalty_program.test/api/v1';
let token = localStorage.getItem('lp_token');
let currentUser = null;
let achData = null;
let activeTab = 'unlocked';
let isDark = false;
let authMode = 'login';

function toggleTheme(){
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
  document.getElementById('toggle-pill').classList.toggle('on', isDark);
}

function switchAuth(mode){
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(function(t){ t.classList.toggle('active', t.dataset.mode === mode); });
  document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('lerror').textContent = '';
  document.getElementById('rerror').textContent = '';
}

function initials(name){
  if(!name) return '?';
  return name.split(' ').map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
}

async function apiFetch(path, opts){
  opts = opts || {};
  var headers = {'Content-Type':'application/json','Accept':'application/json'};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(API + path, Object.assign({}, opts, {headers: headers}));
}

async function boot(){
  if(!token){ render('login'); return; }
  render('loading');
  try {
    var res = await apiFetch('/user');
    if(!res.ok){ token = null; localStorage.removeItem('lp_token'); render('login'); return; }
    currentUser = await res.json();
    await loadAchievements();
    render('dashboard');
  } catch(e){ render('login'); }
}

async function loadAchievements(){
  try {
    var res = await apiFetch('/users/' + currentUser.id + '/achievements');
    var json = await res.json();
    achData = json.data;
  } catch(e){ achData = null; }
}

async function doLogin(e){
  e.preventDefault();
  var username = document.getElementById('lusername').value.trim();
  var password = document.getElementById('lpassword').value;
  document.getElementById('lerror').textContent = '';
  if(!username || !password) return;
  try {
    var res = await apiFetch('/login', {method:'POST', body: JSON.stringify({username: username, password: password})});
    var data = await res.json();
    if(!res.ok){ document.getElementById('lerror').textContent = data.message || 'Invalid credentials'; return; }
    token = data.access_token;
    localStorage.setItem('lp_token', token);
    var uRes = await apiFetch('/user');
    currentUser = await uRes.json();
    render('loading');
    await loadAchievements();
    render('dashboard');
  } catch(e){ document.getElementById('lerror').textContent = 'Cannot connect to API'; }
}

async function doRegister(e){
  e.preventDefault();
  var full_name = document.getElementById('rfull_name').value.trim();
  var username = document.getElementById('rusername').value.trim();
  var email = document.getElementById('remail').value.trim();
  var password = document.getElementById('rpassword').value;
  var password_confirmation = document.getElementById('rpassword_conf').value;
  document.getElementById('rerror').textContent = '';
  if(!full_name || !username || !email || !password){ document.getElementById('rerror').textContent = 'All fields are required'; return; }
  try {
    var res = await apiFetch('/register', {method:'POST', body: JSON.stringify({full_name:full_name, username:username, email:email, password:password, password_confirmation:password_confirmation})});
    var data = await res.json();
    if(!res.ok){
      var errs = data.errors ? Object.values(data.errors).flat().join(' ') : (data.message || 'Registration failed');
      document.getElementById('rerror').textContent = errs; return;
    }
    token = data.access_token;
    localStorage.setItem('lp_token', token);
    currentUser = data.user;
    render('loading');
    await loadAchievements();
    render('dashboard');
  } catch(e){ document.getElementById('rerror').textContent = 'Cannot connect to API'; }
}

async function doLogout(){
  try { await apiFetch('/logout', {method:'POST'}); } catch(e){}
  token = null; currentUser = null; achData = null;
  localStorage.removeItem('lp_token');
  render('login');
}

async function doPurchase(){
  var input = document.getElementById('pamt');
  var amt = parseFloat(input.value);
  var msg = document.getElementById('pmsg');
  if(!amt || amt <= 0){ msg.textContent = 'Enter a valid amount'; return; }
  input.value = ''; msg.textContent = '';
  try {
    var res = await apiFetch('/purchases', {method:'POST', body: JSON.stringify({amount: amt})});
    var data = await res.json();
    msg.textContent = data.message || 'Done';
    var uRes = await apiFetch('/user');
    currentUser = await uRes.json();
    await loadAchievements();
    refreshDashboard();
  } catch(e){ msg.textContent = 'Request failed'; }
}

function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === tab); });
  renderAchGrid();
}

function renderAchGrid(){
  var c = document.getElementById('ach-grid');
  if(!c) return;
  var list = activeTab === 'unlocked'
    ? ((achData && achData.achievements && achData.achievements.unlocked_achievements) || [])
    : ((achData && achData.achievements && achData.achievements.next_available_achievements) || []);
  if(!list.length){ c.innerHTML = '<div class="empty">None yet.</div>'; return; }
  c.innerHTML = list.map(function(a){
    return '<div class="ach-chip ' + (activeTab === 'unlocked' ? 'unlocked' : '') + '">'
      + '<div class="ach-chip-name">' + a.name + '</div>'
      + '<div class="ach-chip-meta">' + a.points_awarded + ' pts &middot; ' + (a.type === 'purchases_count' ? 'purchases' : 'spending') + '</div>'
      + '</div>';
  }).join('');
}

function progressPct(){
  var cur = (achData && achData.badges && achData.badges.current_badge && achData.badges.current_badge.points_required) || 0;
  var nxtPts = achData && achData.badges && achData.badges.next_badge && achData.badges.next_badge.points_required;
  if(!nxtPts) return 100;
  var pts = (currentUser && currentUser.current_points) || 0;
  return Math.min(100, Math.max(0, Math.round(((pts - cur) / (nxtPts - cur)) * 100)));
}

function refreshDashboard(){
  var pts = document.getElementById('pts-val');
  if(pts) pts.textContent = ((currentUser && currentUser.current_points) || 0) + ' pts';
  var fill = document.getElementById('prog-fill');
  if(fill) fill.style.width = progressPct() + '%';
  var rem = document.getElementById('prog-rem');
  var remaining = achData && achData.badges && achData.badges.remaining_to_unlock_next_badge;
  if(rem) rem.textContent = (remaining != null ? remaining : '—') + ' pts to go';
  renderAchGrid();
}

function render(view){
  var root = document.getElementById('root');
  if(view === 'loading'){
    root.innerHTML = '<div class="loading-wrap">Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>';
    return;
  }
  if(view === 'login'){
    root.innerHTML = '<div class="login-wrap"><div class="card login-card">'
      + '<h2>Loyalty Program</h2><p style="color:var(--text-muted); margin-bottom:1.5rem">Welcome back, please sign in</p>'
      + '<div class="auth-tabs">'
      + '<button class="auth-tab active" data-mode="login" onclick="switchAuth(\'login\')">Sign in</button>'
      + '<button class="auth-tab" data-mode="register" onclick="switchAuth(\'register\')">New Account</button>'
      + '</div>'
      + '<div id="login-form">'
      + '<form onsubmit="doLogin(event)">'
      + '<div class="field"><label>Username</label><input id="lusername" autocomplete="username" placeholder="Username"/></div>'
      + '<div class="field"><label>Password</label><input id="lpassword" type="password" autocomplete="current-password" placeholder="••••••••"/></div>'
      + '<button class="btn" type="submit">Sign in to account</button>'
      + '<div class="error-msg" id="lerror"></div>'
      + '</form></div>'
      + '<div id="register-form" style="display:none">'
      + '<form onsubmit="doRegister(event)">'
      + '<div class="field"><label>Full name</label><input id="rfull_name" placeholder="John Snow"/></div>'
      + '<div class="field"><label>Username</label><input id="rusername" autocomplete="username" placeholder="johnsnow"/></div>'
      + '<div class="field"><label>Email</label><input id="remail" type="email" autocomplete="email" placeholder="john@example.com"/></div>'
      + '<div class="field"><label>Password</label><input id="rpassword" type="password" autocomplete="new-password" placeholder="Min 8 characters"/></div>'
      + '<div class="field"><label>Confirm</label><input id="rpassword_conf" type="password" autocomplete="new-password" placeholder="Repeat password"/></div>'
      + '<button class="btn" type="submit">Create account</button>'
      + '<div class="error-msg" id="rerror"></div>'
      + '</form></div>'
      + '</div></div>';
    return;
  }
  if(view === 'dashboard'){
    var cur = achData && achData.badges && achData.badges.current_badge;
    var nxt = achData && achData.badges && achData.badges.next_badge;
    var rem = achData && achData.badges && achData.badges.remaining_to_unlock_next_badge;
    var pct = progressPct();
    var badgeSection = '<div class="progress-container">'
      + '<div style="display:flex; justify-content:space-between; align-items:center">'
      + (cur ? '<span class="chip-label" style="font-weight:700">' + cur.name + '</span>' : '<span>No badge</span>')
      + (nxt ? '<span style="font-size:12px; color:var(--text-muted)">Next: ' + nxt.name + '</span>' : '')
      + '</div>'
      + (nxt
        ? '<div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:' + pct + '%"></div></div>'
          + '<div style="display:flex; justify-content:space-between; font-size:11px; font-weight:600; font-family:JetBrains Mono">'
          + '<span>' + ((currentUser && currentUser.current_points) || 0) + ' PTS</span>'
          + '<span id="prog-rem">' + (rem != null ? rem : '—') + ' TO GO</span>'
          + '</div>'
        : '<div style="margin-top:10px; font-size:13px" class="empty">Max level reached!</div>')
      + '</div>';
      
    root.innerHTML = '<div class="user-card">'
      + '<div class="user-left"><div class="avatar">' + initials((currentUser && currentUser.full_name) || (currentUser && currentUser.username)) + '</div>'
      + '<div><div class="uname">' + ((currentUser && currentUser.full_name) || (currentUser && currentUser.username) || '—') + '</div>'
      + '<div class="uemail">' + ((currentUser && currentUser.email) || '') + '</div></div></div>'
      + '<div class="right-group" style="display:flex; align-items:center; gap:12px">'
      + '<div class="pts-badge" id="pts-val">' + ((currentUser && currentUser.current_points) || 0) + ' pts</div>'
      + '<button class="sign-out" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:600" onclick="doLogout()">Sign out</button></div></div>'
      + '<div class="card"><div class="card-label">Rank Status</div>' + badgeSection + '</div>'
      + '<div class="card"><div class="card-label">Quick Purchase</div>'
      + '<div class="purchase-row"><input id="pamt" type="number" min="1" placeholder="Enter amount..." />'
      + '<button class="btn" style="width:auto; padding:0 24px" onclick="doPurchase()">Submit</button></div>'
      + '<div class="success-msg" id="pmsg"></div></div>'
      + '<div class="card"><div class="card-label">Achievements</div>'
      + '<div class="tabs"><button class="tab active" data-tab="unlocked" onclick="setTab(\'unlocked\')">Unlocked</button>'
      + '<button class="tab" data-tab="next" onclick="setTab(\'next\')">Upcoming</button></div>'
      + '<div class="ach-grid" id="ach-grid"></div></div>';
    renderAchGrid();
  }
}

boot();
</script>
</body>
</html> -->

  .login-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 0.5rem; }
  .auth-tabs { background: var(--bg); padding: 4px; display: flex; gap: 4px; border-radius: var(--radius-sm); margin-bottom: 1.5rem; border: 1px solid var(--border); }
  .auth-tab { flex: 1; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
  .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
  .field { text-align: left; margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .field input { width: 100%; padding: 12px 16px; font-family: inherit; font-size: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); transition: all 0.2s; }
  .field input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-soft); }
  .btn { width: 100%; padding: 14px; font-size: 14px; font-weight: 700; border: none; border-radius: var(--radius-sm); background: var(--brand); color: white; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  .btn:active { transform: scale(0.98); }
  .error-msg { font-size: 13px; color: #e74c3c; margin-top: 0.75rem; min-height: 18px; text-align: center; }
  .user-card { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .user-left { display: flex; align-items: center; gap: 1rem; }
  .avatar { width: 52px; height: 52px; border-radius: 16px; background: var(--brand); color: white; font-weight: 700; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .uname { font-size: 18px; font-weight: 700; }
  .uemail { font-size: 13px; color: var(--text-muted); }
  .pts-badge { font-family: 'JetBrains Mono', monospace; background: var(--brand-soft); color: var(--brand); padding: 8px 16px; border-radius: 100px; font-weight: 600; }
  .progress-container { background: var(--bg); padding: 20px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .progress-track { height: 10px; background: var(--border); border-radius: 10px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: var(--brand); transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
  .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ach-chip { padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); }
  .ach-chip.unlocked { border-color: var(--accent); background: var(--accent-soft); }
  .ach-chip-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .ach-chip-meta { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
  .purchase-row { display: flex; gap: 10px; }
  .purchase-row input { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px; outline: none; }
  .purchase-row input:focus { border-color: var(--accent); }
  .tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .tab { padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .empty { font-size: 13px; color: var(--text-muted); }
  .success-msg { font-size: 13px; color: var(--accent); margin-top: 8px; min-height: 18px; font-weight: 600; }
  .loading-wrap { text-align: center; padding: 4rem 0; color: var(--text-muted); font-size: 14px; }
  .sign-out { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }

  /* Toast notifications */
  .toast-stack { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    font-size: 14px;
    font-weight: 600;
    min-width: 260px;
    max-width: 340px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: slideIn 0.3s ease;
    pointer-events: all;
  }
  .toast.achievement { border-left: 4px solid var(--brand); }
  .toast.badge { border-left: 4px solid var(--accent); }
  .toast.cashback { border-left: 4px solid #f59e0b; }
  .toast-icon { font-size: 20px; flex-shrink: 0; }
  .toast-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .toast-body { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(20px); } }

  @media (max-width: 480px) {
    .ach-grid { grid-template-columns: 1fr; }
    .user-card { flex-direction: column; align-items: flex-start; }
    .toast-stack { left: 16px; right: 16px; bottom: 16px; }
    .toast { min-width: unset; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">loyalty<span>.</span></div>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span id="theme-label">Light</span>
    <div class="toggle-pill" id="toggle-pill"></div>
  </div>
</div>

<div class="page" id="root"></div>
<div class="toast-stack" id="toast-stack"></div>

<script>
const API = 'http://loyalty_program.test/api/v1';
let token = localStorage.getItem('lp_token');
let currentUser = null;
let achData = null;
let activeTab = 'unlocked';
let isDark = false;
let authMode = 'login';

function toggleTheme(){
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
  document.getElementById('toggle-pill').classList.toggle('on', isDark);
}

function switchAuth(mode){
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(function(t){ t.classList.toggle('active', t.dataset.mode === mode); });
  document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('lerror').textContent = '';
  document.getElementById('rerror').textContent = '';
}

function initials(name){
  if(!name) return '?';
  return name.split(' ').map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
}

async function apiFetch(path, opts){
  opts = opts || {};
  var headers = {'Content-Type':'application/json','Accept':'application/json'};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(API + path, Object.assign({}, opts, {headers: headers}));
}

/* ── Toast system ── */
function showToast(type, title, body, delay){
  delay = delay || 0;
  setTimeout(function(){
    var stack = document.getElementById('toast-stack');
    var icons = { achievement: '★', badge: '◆', cashback: '₦' };
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.innerHTML = '<div class="toast-icon">' + (icons[type]||'•') + '</div>'
      + '<div><div class="toast-title">' + title + '</div>'
      + '<div class="toast-body">' + body + '</div></div>';
    stack.appendChild(el);
    setTimeout(function(){
      el.style.animation = 'slideOut 0.3s ease forwards';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, 4000);
  }, delay);
}

/* ── Diff helper ── */
function diffAndNotify(oldAch, newAch){
  if(!oldAch || !newAch) return;
  var oldUnlocked = (oldAch.achievements && oldAch.achievements.unlocked_achievements) || [];
  var newUnlocked = (newAch.achievements && newAch.achievements.unlocked_achievements) || [];
  var oldIds = oldUnlocked.map(function(a){ return a.id; });

  var gained = newUnlocked.filter(function(a){ return oldIds.indexOf(a.id) === -1; });
  gained.forEach(function(a, i){
    showToast('achievement', 'Achievement unlocked', a.name + ' — ' + a.points_awarded + ' pts', i * 600);
  });

  var oldBadge = oldAch.badges && oldAch.badges.current_badge;
  var newBadge = newAch.badges && newAch.badges.current_badge;
  var oldBadgeId = oldBadge && oldBadge.id;
  var newBadgeId = newBadge && newBadge.id;

  if(newBadgeId && newBadgeId !== oldBadgeId){
    var delay = gained.length * 600;
    showToast('badge', 'Badge earned!', newBadge.name + ' unlocked', delay);
    showToast('cashback', 'Cashback rewarded', '₦300 has been added to your account', delay + 600);
  }
}

async function boot(){
  if(!token){ render('login'); return; }
  render('loading');
  try {
    var res = await apiFetch('/user');
    if(!res.ok){ token = null; localStorage.removeItem('lp_token'); render('login'); return; }
    currentUser = await res.json();
    await loadAchievements();
    render('dashboard');
  } catch(e){ render('login'); }
}

async function loadAchievements(){
  try {
    var res = await apiFetch('/users/' + currentUser.id + '/achievements');
    var json = await res.json();
    achData = json.data;
  } catch(e){ achData = null; }
}

async function doLogin(e){
  e.preventDefault();
  var username = document.getElementById('lusername').value.trim();
  var password = document.getElementById('lpassword').value;
  document.getElementById('lerror').textContent = '';
  if(!username || !password) return;
  try {
    var res = await apiFetch('/login', {method:'POST', body: JSON.stringify({username:username, password:password})});
    var data = await res.json();
    if(!res.ok){ document.getElementById('lerror').textContent = data.message || 'Invalid credentials'; return; }
    token = data.access_token;
    localStorage.setItem('lp_token', token);
    var uRes = await apiFetch('/user');
    currentUser = await uRes.json();
    render('loading');
    await loadAchievements();
    render('dashboard');
  } catch(e){ document.getElementById('lerror').textContent = 'Cannot connect to API'; }
}

async function doRegister(e){
  e.preventDefault();
  var full_name = document.getElementById('rfull_name').value.trim();
  var username = document.getElementById('rusername').value.trim();
  var email = document.getElementById('remail').value.trim();
  var password = document.getElementById('rpassword').value;
  var password_confirmation = document.getElementById('rpassword_conf').value;
  document.getElementById('rerror').textContent = '';
  if(!full_name || !username || !email || !password){ document.getElementById('rerror').textContent = 'All fields are required'; return; }
  try {
    var res = await apiFetch('/register', {method:'POST', body: JSON.stringify({full_name:full_name, username:username, email:email, password:password, password_confirmation:password_confirmation})});
    var data = await res.json();
    if(!res.ok){
      var errs = data.errors ? Object.values(data.errors).flat().join(' ') : (data.message || 'Registration failed');
      document.getElementById('rerror').textContent = errs; return;
    }
    token = data.access_token;
    localStorage.setItem('lp_token', token);
    currentUser = data.user;
    render('loading');
    await loadAchievements();
    render('dashboard');
  } catch(e){ document.getElementById('rerror').textContent = 'Cannot connect to API'; }
}

async function doLogout(){
  try { await apiFetch('/logout', {method:'POST'}); } catch(e){}
  token = null; currentUser = null; achData = null;
  localStorage.removeItem('lp_token');
  render('login');
}

async function doPurchase(){
  var input = document.getElementById('pamt');
  var amt = parseFloat(input.value);
  var msg = document.getElementById('pmsg');
  if(!amt || amt <= 0){ msg.textContent = 'Enter a valid amount'; return; }
  input.value = ''; msg.textContent = '';

  var oldAch = achData ? JSON.parse(JSON.stringify(achData)) : null;

  try {
    var res = await apiFetch('/purchases', {method:'POST', body: JSON.stringify({amount:amt})});
    var data = await res.json();
    msg.textContent = data.message || 'Done';
    var uRes = await apiFetch('/user');
    currentUser = await uRes.json();
    await loadAchievements();
    diffAndNotify(oldAch, achData);
    refreshDashboard();
  } catch(e){ msg.textContent = 'Request failed'; }
}

function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === tab); });
  renderAchGrid();
}

function renderAchGrid(){
  var c = document.getElementById('ach-grid');
  if(!c) return;
  var list = activeTab === 'unlocked'
    ? ((achData && achData.achievements && achData.achievements.unlocked_achievements) || [])
    : ((achData && achData.achievements && achData.achievements.next_available_achievements) || []);
  if(!list.length){ c.innerHTML = '<div class="empty">None yet.</div>'; return; }
  c.innerHTML = list.map(function(a){
    return '<div class="ach-chip ' + (activeTab === 'unlocked' ? 'unlocked' : '') + '">'
      + '<div class="ach-chip-name">' + a.name + '</div>'
      + '<div class="ach-chip-meta">' + a.points_awarded + ' pts &middot; ' + (a.type === 'purchases_count' ? 'purchases' : 'spending') + '</div>'
      + '</div>';
  }).join('');
}

function progressPct(){
  var cur = (achData && achData.badges && achData.badges.current_badge && achData.badges.current_badge.points_required) || 0;
  var nxtPts = achData && achData.badges && achData.badges.next_badge && achData.badges.next_badge.points_required;
  if(!nxtPts) return 100;
  var pts = (currentUser && currentUser.current_points) || 0;
  return Math.min(100, Math.max(0, Math.round(((pts - cur) / (nxtPts - cur)) * 100)));
}

function refreshDashboard(){
  var pts = document.getElementById('pts-val');
  if(pts) pts.textContent = ((currentUser && currentUser.current_points) || 0) + ' pts';
  var fill = document.getElementById('prog-fill');
  if(fill) fill.style.width = progressPct() + '%';
  var rem = document.getElementById('prog-rem');
  var remaining = achData && achData.badges && achData.badges.remaining_to_unlock_next_badge;
  if(rem) rem.textContent = (remaining != null ? remaining : '—') + ' pts to go';
  renderAchGrid();
}

function render(view){
  var root = document.getElementById('root');
  if(view === 'loading'){
    root.innerHTML = '<div class="loading-wrap">Loading...</div>';
    return;
  }
  if(view === 'login'){
    root.innerHTML = '<div class="login-wrap"><div class="card login-card">'
      + '<h2>Loyalty Program</h2><p style="color:var(--text-muted);margin-bottom:1.5rem">Welcome back</p>'
      + '<div class="auth-tabs">'
      + '<button class="auth-tab active" data-mode="login" onclick="switchAuth(\'login\')">Sign in</button>'
      + '<button class="auth-tab" data-mode="register" onclick="switchAuth(\'register\')">Register</button>'
      + '</div>'
      + '<div id="login-form"><form onsubmit="doLogin(event)">'
      + '<div class="field"><label>Username</label><input id="lusername" autocomplete="username" placeholder="Username"/></div>'
      + '<div class="field"><label>Password</label><input id="lpassword" type="password" autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/></div>'
      + '<button class="btn" type="submit">Sign in</button>'
      + '<div class="error-msg" id="lerror"></div>'
      + '</form></div>'
      + '<div id="register-form" style="display:none"><form onsubmit="doRegister(event)">'
      + '<div class="field"><label>Full name</label><input id="rfull_name" placeholder="John Snow"/></div>'
      + '<div class="field"><label>Username</label><input id="rusername" autocomplete="username" placeholder="johnsnow"/></div>'
      + '<div class="field"><label>Email</label><input id="remail" type="email" autocomplete="email" placeholder="john@example.com"/></div>'
      + '<div class="field"><label>Password</label><input id="rpassword" type="password" autocomplete="new-password" placeholder="Min 8 characters"/></div>'
      + '<div class="field"><label>Confirm password</label><input id="rpassword_conf" type="password" autocomplete="new-password" placeholder="Repeat password"/></div>'
      + '<button class="btn" type="submit">Create account</button>'
      + '<div class="error-msg" id="rerror"></div>'
      + '</form></div>'
      + '</div></div>';
    return;
  }
  if(view === 'dashboard'){
    var cur = achData && achData.badges && achData.badges.current_badge;
    var nxt = achData && achData.badges && achData.badges.next_badge;
    var rem = achData && achData.badges && achData.badges.remaining_to_unlock_next_badge;
    var pct = progressPct();
    var badgeSection = '<div class="progress-container">'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + (cur ? '<span style="font-weight:700;font-size:15px">' + cur.name + '</span>' : '<span style="color:var(--text-muted)">No badge yet</span>')
      + (nxt ? '<span style="font-size:12px;color:var(--text-muted)">Next: ' + nxt.name + '</span>' : '')
      + '</div>'
      + (nxt
        ? '<div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:' + pct + '%"></div></div>'
          + '<div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;font-family:JetBrains Mono,monospace">'
          + '<span>' + ((currentUser && currentUser.current_points) || 0) + ' PTS</span>'
          + '<span id="prog-rem">' + (rem != null ? rem : '—') + ' TO GO</span>'
          + '</div>'
        : '<div style="margin-top:10px;font-size:13px;color:var(--text-muted)">Max level reached!</div>')
      + '</div>';

    root.innerHTML = '<div class="user-card">'
      + '<div class="user-left"><div class="avatar">' + initials((currentUser && currentUser.full_name) || (currentUser && currentUser.username)) + '</div>'
      + '<div><div class="uname">' + ((currentUser && currentUser.full_name) || (currentUser && currentUser.username) || '—') + '</div>'
      + '<div class="uemail">' + ((currentUser && currentUser.email) || '') + '</div></div></div>'
      + '<div style="display:flex;align-items:center;gap:12px">'
      + '<div class="pts-badge" id="pts-val">' + ((currentUser && currentUser.current_points) || 0) + ' pts</div>'
      + '<button class="sign-out" onclick="doLogout()">Sign out</button></div></div>'
      + '<div class="card"><div class="card-label">Rank Status</div>' + badgeSection + '</div>'
      + '<div class="card"><div class="card-label">Quick Purchase</div>'
      + '<div class="purchase-row"><input id="pamt" type="number" min="1" placeholder="Amount in &#8358;"/>'
      + '<button class="btn" style="width:auto;padding:0 24px" onclick="doPurchase()">Submit</button></div>'
      + '<div class="success-msg" id="pmsg"></div></div>'
      + '<div class="card"><div class="card-label">Achievements</div>'
      + '<div class="tabs"><button class="tab active" data-tab="unlocked" onclick="setTab(\'unlocked\')">Unlocked</button>'
      + '<button class="tab" data-tab="next" onclick="setTab(\'next\')">Upcoming</button></div>'
      + '<div class="ach-grid" id="ach-grid"></div></div>';
    renderAchGrid();
  }
}

boot();
</script>
</body>
</html>
